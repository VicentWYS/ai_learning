<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>JavaScript 函数示例</title>
    <script src="main.js"></script>
</head>

<body>
    <h2>JavaScript 函数</h2>
    <p id="demo">这里将显示函数的返回值</p>
    <button type="button" onclick="show_add()">两数相加 — add()</button>
    <button type="button" onclick="show_multiply()">两数相乘 — multiply()</button>
    <button type="button" onclick="show_max()">取较大值 — getMax()</button>
    <button type="button" onclick="show_circle_area()">圆面积 — getCircleArea()</button>
    <button type="button" onclick="show_greet()">箭头函数 — greet()</button>
</body>

</html>
