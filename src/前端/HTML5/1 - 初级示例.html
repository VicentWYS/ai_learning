<!-- 
 注意：对于中文网页需要使用 <meta charset="utf-8"> 声明编码，否则会出现乱码。
 有些浏览器(如 360 浏览器)会设置 GBK 为默认编码，则你需要设置为 <meta charset="gbk">。 -->

<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>菜鸟教程</title>
</head>

<body>
    <h1>HTML教程</h1>
    <p>HTML概念介绍</p>
    <p>
        <a href="http://www.baidu.com">百度</a>
    </p>
    <p>
        <img src="image.jpg" alt="An example image">
    </p>

</body>

</html>
